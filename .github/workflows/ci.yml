name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dco:
    name: dco
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check commit sign-offs
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh api --paginate --slurp "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/commits" > commits.json
          python3 - <<'PY'
          import json
          import re
          import sys

          with open("commits.json", encoding="utf-8") as fh:
              pages = json.load(fh)

          commits = [commit for page in pages for commit in page]
          signoff = re.compile(r"^Signed-off-by: .+ <[^>]+>$", re.IGNORECASE | re.MULTILINE)
          missing = []

          for commit in commits:
              message = commit["commit"]["message"]
              subject = message.splitlines()[0] if message.splitlines() else "(no subject)"
              if not signoff.search(message):
                  missing.append(f"{commit['sha'][:12]} {subject}")

          if missing:
              print("The following commits are missing DCO Signed-off-by lines:")
              for item in missing:
                  print(f"- {item}")
              print("\nUse `git commit --amend --signoff` or `git rebase --signoff` and push again.")
              sys.exit(1)
          PY

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt
      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component clippy
      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          restore-keys: ${{ runner.os }}-cargo-
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal
      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          restore-keys: ${{ runner.os }}-cargo-
      - name: Run tests
        run: cargo test --all-targets

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal
      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          restore-keys: ${{ runner.os }}-cargo-
      - name: Build release binary
        run: cargo build --release

  docs:
    name: docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Validate docs
        run: python3 scripts/check_docs.py
      - name: Validate Speckit sync dry run
        run: python3 scripts/speckit_sync_issues.py --feature-dir tests/fixtures/speckit-sync-feature --dry-run
      - name: Validate release doc generation
        run: python3 scripts/generate_release_docs.py v0.0.0 --output-dir target/release-docs-test
      - name: Test automation helpers
        run: PYTHONDONTWRITEBYTECODE=1 python3 scripts/test_automation.py

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, build, docs]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal
      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Enforce coverage
        run: cargo tarpaulin --fail-under 86
