name: API

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/api.yml"
  pull_request:
    paths:
      - "api/**"
      - ".github/workflows/api.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: worker tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: api
      - name: Typecheck
        run: npm run typecheck
        working-directory: api
      - name: Test
        run: npm test
        working-directory: api

  deploy:
    name: deploy worker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: api
      - name: Prepare Wrangler config
        env:
          SEARCH_CACHE_KV_ID: ${{ vars.SEARCH_CACHE_KV_ID }}
          SKILLS_INDEX_D1_ID: ${{ vars.SKILLS_INDEX_D1_ID }}
        run: npm run prepare:config
        working-directory: api
      - name: Upload SkillsMP secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SKILLS_MP_API_TOKEN: ${{ secrets.SKILLS_MP_API_TOKEN }}
        shell: bash
        working-directory: api
        run: |
          set -euo pipefail
          if [ -z "${SKILLS_MP_API_TOKEN}" ]; then
            echo "::error::Set the SKILLS_MP_API_TOKEN repository secret."
            exit 1
          fi
          printf '%s' "${SKILLS_MP_API_TOKEN}" | npx wrangler secret put SKILLS_MP_API_TOKEN
      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
        working-directory: api
      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply ktesio-search-index --remote
        working-directory: api
