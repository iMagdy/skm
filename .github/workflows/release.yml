name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: kt
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: kt.exe
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: kt
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: kt
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --target ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          asset="ktesio-${tag}-${{ matrix.target }}.${{ matrix.archive }}"
          mkdir -p dist/package
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/package/
          cp README.md LICENSE dist/package/
          tar -czf "dist/${asset}" -C dist/package .
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${asset}" > "${asset}.sha256")
          else
            (cd dist && shasum -a 256 "${asset}" > "${asset}.sha256")
          fi
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $asset = "ktesio-$tag-${{ matrix.target }}.${{ matrix.archive }}"
          New-Item -ItemType Directory -Force -Path dist/package | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/package/
          Copy-Item README.md dist/package/
          Copy-Item LICENSE dist/package/
          Compress-Archive -Path dist/package/* -DestinationPath "dist/$asset" -Force
          $hash = (Get-FileHash "dist/$asset" -Algorithm SHA256).Hash.ToLower()
          "$hash  $asset" | Out-File -Encoding ascii "dist/$asset.sha256"
      - name: Upload archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ktesio-${{ github.ref_name }}-${{ matrix.target }}
          path: dist/*

  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    environment: release
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Set release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          package_ref="ghcr.io/${GITHUB_REPOSITORY}:${tag}"
          latest_ref="ghcr.io/${GITHUB_REPOSITORY}:latest"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "package_ref=${package_ref,,}" >> "$GITHUB_OUTPUT"
          echo "latest_ref=${latest_ref,,}" >> "$GITHUB_OUTPUT"
      - name: Prepare release notes and checksums
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          python3 scripts/generate_release_docs.py "$tag" --output-dir target/release-docs
          (cd dist && cat *.sha256 | sort > "ktesio-${tag}-checksums.txt")
      - name: Publish crates.io crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          crate_name="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["name"])')"
          crate_version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          if [ "$crate_version" != "${tag#v}" ]; then
            echo "::error::Cargo package version ${crate_version} must match release tag ${tag}."
            exit 1
          fi
          user_agent="ktesio-release-workflow (${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}; release automation)"
          status="$(curl --silent --show-error --user-agent "$user_agent" --output /tmp/crate-version.json --write-out "%{http_code}" "https://crates.io/api/v1/crates/${crate_name}/${crate_version}")"
          case "$status" in
            200)
              echo "${crate_name} ${crate_version} is already published on crates.io"
              ;;
            404)
              if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
                echo "::error::Set a CARGO_REGISTRY_TOKEN secret with publish access to the ${crate_name} crate."
                exit 1
              fi
              cargo publish --locked
              ;;
            *)
              cat /tmp/crate-version.json
              echo "::error::Unexpected crates.io API status ${status} while checking ${crate_name} ${crate_version}."
              exit 1
              ;;
          esac
      - name: Resolve Homebrew tap configuration
        id: homebrew
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          HOMEBREW_TAP_BRANCH: ${{ vars.HOMEBREW_TAP_BRANCH }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "::error::Set a HOMEBREW_TAP_TOKEN secret with contents:write access to the Homebrew tap repository."
            exit 1
          fi
          echo "repository=${HOMEBREW_TAP_REPOSITORY:-${GITHUB_REPOSITORY_OWNER}/homebrew-tap}" >> "$GITHUB_OUTPUT"
          echo "branch=${HOMEBREW_TAP_BRANCH:-main}" >> "$GITHUB_OUTPUT"
      - name: Create or update draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "Ktesio ${tag}" --notes-file target/release-docs/release-body.md --draft
          else
            gh release create "$tag" --draft --title "Ktesio ${tag}" --notes-file target/release-docs/release-body.md
          fi
          gh release upload "$tag" dist/* --clobber
      - name: Set up ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0
        with:
          version: 1.3.0
      - name: Publish GitHub Package
        env:
          GHCR_TOKEN: ${{ github.token }}
          PACKAGE_REF: ${{ steps.release.outputs.package_ref }}
          LATEST_REF: ${{ steps.release.outputs.latest_ref }}
        shell: bash
        run: |
          set -euo pipefail
          echo "$GHCR_TOKEN" | oras login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          cd dist
          annotations=(
            "--annotation" "org.opencontainers.image.title=Ktesio ${GITHUB_REF_NAME} release archives"
            "--annotation" "org.opencontainers.image.description=Prebuilt Ktesio release archives for macOS, Linux, and Windows"
            "--annotation" "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}"
            "--annotation" "org.opencontainers.image.url=https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
            "--annotation" "org.opencontainers.image.version=${GITHUB_REF_NAME}"
            "--annotation" "org.opencontainers.image.revision=${GITHUB_SHA}"
          )
          oras push "$PACKAGE_REF" --artifact-type "application/vnd.ktesio.release.v1" "${annotations[@]}" *
          oras push "$LATEST_REF" --artifact-type "application/vnd.ktesio.release.v1" "${annotations[@]}" *
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          gh release edit "$tag" --draft=false --latest
      - name: Checkout Homebrew tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ steps.homebrew.outputs.repository }}
          ref: ${{ steps.homebrew.outputs.branch }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Publish Homebrew formula
        env:
          TAP_BRANCH: ${{ steps.homebrew.outputs.branch }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          python3 scripts/generate_homebrew_formula.py "$tag" \
            --checksums-file "dist/ktesio-${tag}-checksums.txt" \
            --output homebrew-tap/Formula/ktesio.rb
          git -C homebrew-tap config user.name "github-actions[bot]"
          git -C homebrew-tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C homebrew-tap add Formula/ktesio.rb
          if git -C homebrew-tap diff --cached --quiet; then
            echo "Homebrew formula already up to date"
          else
            git -C homebrew-tap commit -m "chore: update ktesio formula for ${tag}"
            git -C homebrew-tap push origin "HEAD:${TAP_BRANCH}"
          fi
      - name: Open release docs pull request
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          branch="release-docs/${tag}"
          git fetch origin main
          git checkout -B "$branch" origin/main
          python3 scripts/generate_release_docs.py "$tag" --update-files
          if git diff --quiet -- CHANGELOG.md docs/RELEASE_NOTES.md; then
            echo "Release docs already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md docs/RELEASE_NOTES.md
          git commit -s -m "docs: update release notes for ${tag}"
          git push --force-with-lease origin "$branch"
          if gh pr view "$branch" >/dev/null 2>&1; then
            gh pr edit "$branch" --title "docs: update release notes for ${tag}" --body "Updates generated release documentation for ${tag}."
          else
            gh pr create --title "docs: update release notes for ${tag}" --body "Updates generated release documentation for ${tag}." --base main --head "$branch"
          fi
