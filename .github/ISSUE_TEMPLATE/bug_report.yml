name: Bug report
description: Report something that is not working as expected.
title: "fix: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Ktesio.
  - type: input
    id: version
    attributes:
      label: Ktesio version
      description: Run `kt --version` if available.
      placeholder: kt 0.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the command you ran.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include stderr/stdout and relevant files when useful.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: List the smallest steps or fixture needed to reproduce the issue.
    validations:
      required: true
