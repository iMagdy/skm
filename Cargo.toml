[package]
name = "skm"
version = "0.1.0"
edition = "2024"
description = "Agentic skills package manager"

[dependencies]
clap = { version = "4", features = ["derive"] }
miette = { version = "7", features = ["fancy"] }
indicatif = "0.17"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
walkdir = "2"
regex = "1"
dialoguer = "0.11"
